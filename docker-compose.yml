version: '3.8'

services:
  # n8n Workflow Orchestration
  n8n:
    image: n8nio/n8n:latest
    container_name: pca-n8n
    ports:
      - "5678:3000"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-password}
      - N8N_HOST=127.0.0.1
      - N8N_PORT=3000
      - N8N_PROTOCOL=http
      - WEBHOOK_TUNNEL_URL=http://localhost:5678/
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-pca_user}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-password}
      - DB_POSTGRESDB_DATABASE=n8n
    depends_on:
      - postgres
      - neo4j
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - pca-network
    restart: unless-stopped

  # Neo4j Graph Database
  neo4j:
    image: neo4j:latest
    container_name: pca-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - NEO4J_dbms_default__listen__address=0.0.0.0
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_logs:/var/lib/neo4j/logs
    networks:
      - pca-network
    restart: unless-stopped

  # PostgreSQL for n8n + Audit Logs
  postgres:
    image: postgres:15-alpine
    container_name: pca-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-pca_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pca-network
    restart: unless-stopped

  # FastAPI Helper Backend (optional, for dedup + note generation)
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pca-fastapi
    ports:
      - "8000:8000"
    environment:
      - NEO4J_HOST=neo4j
      - NEO4J_PORT=7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - OBSIDIAN_VAULT_PATH=${OBSIDIAN_VAULT_PATH:-/vault}
    volumes:
      - ${OBSIDIAN_VAULT_PATH:-./vault}:/vault
    depends_on:
      - neo4j
    networks:
      - pca-network
    restart: unless-stopped
    profiles:
      - optional

volumes:
  n8n_data:
  neo4j_data:
  neo4j_logs:
  postgres_data:

networks:
  pca-network:
    driver: bridge
